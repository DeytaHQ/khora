name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# ---------------------------------------------------------------------------
# Shared cache key for the Python venv.  Every job that needs the installed
# packages restores the same cache entry, so `uv sync` becomes a no-op (~2s).
# ---------------------------------------------------------------------------
env:
  VENV_CACHE_KEY: venv-${{ github.run_id }}
  UV_CACHE_KEY_PREFIX: uv-Linux-py3.13

jobs:
  # ============================================================================
  # ADR-084: Secret typing check — standalone semgrep, warn-mode (DYT-3993).
  # Khora is open-source; cannot reference private deyta-core reusable workflows.
  # Rule lives in .semgrep.yml; severity WARNING keeps CI green during D3-R.
  # Flip severity to ERROR in D3-C once all str-typed secrets are re-typed.
  # ============================================================================
  secret-typing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Secret typing check (ADR-084 warn-mode)
        run: uvx semgrep --config .semgrep.yml src/

  # ============================================================================
  # Guard — refuse to track AGENTS.md (mirrors local pre-commit hook)
  # ============================================================================
  no-agents-md:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Refuse tracked AGENTS.md
        run: |
          if git ls-files --error-unmatch AGENTS.md >/dev/null 2>&1; then
            echo "AGENTS.md must not be tracked (it is gitignored and locally regenerated)."
            exit 1
          fi

  # ============================================================================
  # Install — build the venv once, cache it for parallel jobs
  # ============================================================================
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          prune-cache: false

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Save venv cache
        uses: actions/cache/save@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.13-${{ hashFiles('uv.lock') }}-${{ github.run_id }}

  # ============================================================================
  # Security — pip-audit (parallel with lint and test)
  # ============================================================================
  security:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          prune-cache: false

      - name: Set up Python
        run: uv python install 3.13

      - name: Restore venv cache
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.13-${{ hashFiles('uv.lock') }}-${{ github.run_id }}
          restore-keys: |
            venv-${{ runner.os }}-py3.13-${{ hashFiles('uv.lock') }}-

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          uv export --no-dev --no-hashes > /tmp/pip-audit-requirements.txt
          uvx pip-audit -r /tmp/pip-audit-requirements.txt --progress-spinner off \
            --ignore-vuln GHSA-xqmj-j6mv-4862  # litellm SSTI in /prompts/test — proxy-only, not exploitable via SDK
        continue-on-error: false

  # ============================================================================
  # Lint — ty type check + prek (formatting, linting, imports)
  # ============================================================================
  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          prune-cache: false

      - name: Set up Python
        run: uv python install 3.13

      - name: Restore venv cache
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.13-${{ hashFiles('uv.lock') }}-${{ github.run_id }}
          restore-keys: |
            venv-${{ runner.os }}-py3.13-${{ hashFiles('uv.lock') }}-

      - name: Type check with ty
        run: uv run ty check src/

      - name: Run prek checks (formatting, linting, imports)
        run: uv run prek run --all-files --hook-stage manual
        env:
          SKIP: ty  # ty already ran above — skip duplicate

  # ============================================================================
  # Test — pytest with coverage (parallel with lint and security)
  # ============================================================================
  test:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          prune-cache: false

      - name: Set up Python
        run: uv python install 3.13

      - name: Restore venv cache
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.13-${{ hashFiles('uv.lock') }}-${{ github.run_id }}
          restore-keys: |
            venv-${{ runner.os }}-py3.13-${{ hashFiles('uv.lock') }}-

      - name: Verify migration source files and ORM/migration drift
        run: uv run pytest tests/unit/test_migration_drift.py -v -o "addopts=" --no-cov

      - name: Run unit tests with coverage (parallel)
        run: |
          uv run pytest tests/unit/ --cov=src/khora --cov-branch --cov-report=xml:coverage-unit.xml --cov-fail-under=0 -n auto

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-unit.xml
          flags: unit
          name: khora-coverage-unit
          fail_ci_if_error: false

      - name: Run integration tests with coverage (serial)
        run: |
          uv run pytest tests/integration/ --cov=src/khora --cov-branch --cov-append --cov-report=term-missing --cov-report=xml:coverage-integration.xml --cov-fail-under=30 -m integration

      - name: Generate JSON coverage for floor check
        run: uv run coverage json -o coverage.json

      - name: Check per-path coverage floors
        run: uv run python scripts/check_coverage_floors.py

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-integration.xml
          flags: integration
          name: khora-coverage-integration
          fail_ci_if_error: false
