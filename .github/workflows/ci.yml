name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ============================================================================
  # Test Job — runs on all pushes and PRs
  # ============================================================================
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          prune-cache: false

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Restore venv cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Security scan (bandit)
        run: uvx bandit -r src/ -f json -o bandit-report.json -ll
        continue-on-error: false

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          uv export --no-dev --no-hashes > /tmp/pip-audit-requirements.txt
          uvx pip-audit -r /tmp/pip-audit-requirements.txt --progress-spinner off
        continue-on-error: false

      - name: Type check with ty
        run: uv run ty check src/

      - name: Run prek checks (formatting, linting, imports)
        run: uv run prek run --all-files

      - name: Verify migration source files and ORM/migration drift
        run: |
          uv run pytest tests/unit/test_migration_drift.py -v -o "addopts=" --no-cov

      - name: Run tests with coverage
        run: |
          uv run pytest --cov=src/khora --cov-branch --cov-report=term-missing --cov-report=xml --cov-fail-under=30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: khora-coverage
          fail_ci_if_error: false

  # ============================================================================
  # Dev Release — publish dev versions on every merge to main.
  #
  # Pipeline (mirrors release.yml structure):
  #   test ──> build-accel-dev (3 platforms × 2 Python versions) ──┬──> publish-dev-khora
  #                                                              └──> publish-dev-accel
  #
  # Version: hatch-vcs produces e.g. 0.5.5.dev14 (PEP 440 dev release).
  # khora-accel: git describe → semver pre-release (0.5.5-dev.14).
  # ============================================================================

  build-accel-dev:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        python: ["3.13", "3.14"]
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - aarch64-apple-darwin
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute dev version from git describe
        id: version
        run: |
          DESC=$(git describe --tags --match 'v*' --long) || {
            echo "::error::No v* tags found. Create at least one version tag."
            exit 1
          }
          echo "git describe: $DESC"
          # Extract distance and hash from the guaranteed --long suffix: -DISTANCE-gHASH
          DISTANCE=$(echo "$DESC" | grep -oE '\-([0-9]+)\-g[0-9a-f]+$' | cut -d- -f2)
          # Tag is everything before -DISTANCE-gHASH
          TAG=$(echo "$DESC" | sed "s/-${DISTANCE}-g[0-9a-f]*$//")
          # Strip v prefix and any pre-release suffix (e.g. v1.0.0-rc1 → 1.0.0)
          BASE=$(echo "${TAG#v}" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$BASE" ] || [ -z "$DISTANCE" ]; then
            echo "::error::Failed to parse git describe output: $DESC"
            exit 1
          fi
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          CARGO_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-dev.${DISTANCE}"
          echo "cargo_version=$CARGO_VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing khora-accel dev: $CARGO_VERSION"

      - name: Set version in Cargo.toml
        run: |
          sed -i.bak "s/^version = .*/version = \"${{ steps.version.outputs.cargo_version }}\"/" rust/khora-accel/Cargo.toml
          rm -f rust/khora-accel/Cargo.toml.bak

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python }}"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter python${{ matrix.python }}
          working-directory: rust/khora-accel
          manylinux: auto
          sccache: 'true'

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-wheel-${{ matrix.target }}-cp${{ matrix.python }}
          path: rust/khora-accel/dist/*.whl

  publish-dev-khora:
    needs: build-accel-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install build dependencies
        run: uv pip install build twine --system

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::956322716887:role/github-actions-codeartifact-publish
          aws-region: us-west-2

      - name: Get CodeArtifact authorization token
        run: |
          TOKEN=$(aws codeartifact get-authorization-token --domain deyta --query authorizationToken --output text)
          echo "::add-mask::$TOKEN"
          echo "CA_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Build wheel
        run: |
          python -m build
          ls dist/*.whl || { echo "::error::No wheels produced"; exit 1; }
          echo "Built: $(ls dist/)"

      - name: Publish to CodeArtifact
        run: |
          twine upload \
            --repository-url https://deyta-956322716887.d.codeartifact.us-west-2.amazonaws.com/pypi/packages/ \
            --username aws \
            --password "${{ env.CA_TOKEN }}" \
            dist/*

  publish-dev-accel:
    needs: build-accel-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dev-wheel-*
          merge-multiple: true
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install twine
        run: uv pip install twine --system

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::956322716887:role/github-actions-codeartifact-publish
          aws-region: us-west-2

      - name: Get CodeArtifact authorization token
        run: |
          TOKEN=$(aws codeartifact get-authorization-token --domain deyta --query authorizationToken --output text)
          echo "::add-mask::$TOKEN"
          echo "CA_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Publish to CodeArtifact
        run: |
          twine upload \
            --repository-url https://deyta-956322716887.d.codeartifact.us-west-2.amazonaws.com/pypi/packages/ \
            --username aws \
            --password "${{ env.CA_TOKEN }}" \
            dist/*
