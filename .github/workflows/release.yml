# Release pipeline — verify CI is green, then publish khora-accel + khora to PyPI.
#
# Trigger: v[0-9]* tag push (e.g. v0.10.2, v1.0.0-rc1) plus manual dispatch.
# This is the ONLY workflow that runs on tag push; ci.yml handles PRs and branches.
#
# Pipeline (serialized):
#   verify-ci-green ──> publish-accel ──> publish-khora
#
# verify-ci-green confirms ci.yml already passed for the tagged SHA on main.
# Re-running the full test suite at tag time was ~10 min of redundant work.
# Tag arbitrary commits at your own risk: if no successful CI run exists for
# the SHA, the release fails fast with a clear error.
#
# Authentication: PyPI Trusted Publishing via GitHub OIDC — no API tokens, no
# AWS credentials. Each publish job runs under the `pypi` deployment
# environment, which the pypi.org trusted-publisher config is bound to.
#
# khora-accel ships as an sdist only (no platform-wheel matrix). PyPI users
# compile the Rust extension at install time via maturin's PEP 517 backend.
#
# Version lockstep: khora and khora-accel are released at identical versions.
#   - khora-accel: `Set version from tag` seds rust/khora-accel/Cargo.toml.
#   - khora: hatch-vcs derives version from the git tag automatically, and
#     `Pin khora-accel to release version` seds pyproject.toml so the
#     published khora wheel hard-requires khora-accel == ${tag-version}.
#
# Publish order: accel first, then khora. Serializing prevents the skew where
# `khora==X.Y.Z` lands on PyPI but its `khora-accel==X.Y.Z` dependency hasn't
# (because the accel job failed mid-flight) — installers would see a broken
# resolution.
#
# Concurrency: one release at a time; never cancel in-flight publishes.

name: Release

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Verify CI is green — precondition gate, replaces the redundant test re-run.
  #
  # ci.yml already runs the full pytest+lint+security suite on every push to
  # main and on every PR. Re-running the same suite on tag push wastes ~10 min
  # per release. Instead we confirm the tagged SHA has a successful ci.yml run
  # via the GitHub Actions REST API. If not, fail loudly: the operator must
  # push the commit to main, wait for CI to pass, and then tag.
  # ============================================================================
  verify-ci-green:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read   # required by `gh api .../actions/workflows/.../runs`
    steps:
      - name: Verify CI workflow succeeded for this SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          # 10-minute poll window — long enough for the typical ~9 min main-CI
          # run that may not have started yet when a tag is pushed seconds
          # after the bump-PR merge (see #554). Tunable via repo variable.
          POLL_TIMEOUT_SECONDS: ${{ vars.VERIFY_CI_GREEN_TIMEOUT_SECONDS || '600' }}
          POLL_INTERVAL_SECONDS: '20'
        run: |
          set -euo pipefail
          echo "Polling for ci.yml result on SHA $SHA (timeout: ${POLL_TIMEOUT_SECONDS}s)..."
          deadline=$(( $(date +%s) + POLL_TIMEOUT_SECONDS ))
          while :; do
            # Fetch unfiltered (the `?status=success` URL filter has a stale-
            # index window of ~30-60s) and classify the most-recent run:
            #   - success: at least one run for this SHA concluded `success`
            #   - failed:  a run is `completed` but none concluded `success`
            #   - running: no run yet, or the latest run is still in_progress
            result=$(gh api \
              "repos/${REPO}/actions/workflows/ci.yml/runs?head_sha=${SHA}&per_page=10" \
              --jq '
                [.workflow_runs[]] as $runs
                | if ($runs | length) == 0 then "running"
                  elif ([$runs[] | select(.conclusion == "success")] | length) > 0 then "success"
                  elif (all($runs[]; .status == "completed")) then "failed"
                  else "running"
                  end
              ')

            case "$result" in
              success)
                echo "ci.yml succeeded on ${SHA} — proceeding with release."
                exit 0
                ;;
              failed)
                echo "::error::ci.yml failed on ${SHA}."
                echo "::error::Fix the failure on main and re-tag — the release pipeline will not publish a broken commit."
                exit 1
                ;;
              running)
                now=$(date +%s)
                if [ "$now" -ge "$deadline" ]; then
                  echo "::error::Timed out after ${POLL_TIMEOUT_SECONDS}s waiting for ci.yml to complete on ${SHA}."
                  echo "::error::Re-run this workflow via workflow_dispatch once CI is green, or bump VERIFY_CI_GREEN_TIMEOUT_SECONDS."
                  exit 1
                fi
                remaining=$(( deadline - now ))
                echo "ci.yml still running on ${SHA} — sleeping ${POLL_INTERVAL_SECONDS}s (${remaining}s remaining)..."
                sleep "$POLL_INTERVAL_SECONDS"
                ;;
            esac
          done

  # ============================================================================
  # Publish khora-accel — source distribution (sdist) to PyPI via Trusted
  # Publishing. No platform-wheel matrix: end users compile the Rust extension
  # at install time via maturin's PEP 517 backend.
  #
  # Runs FIRST (before publish-khora) so that the moment khora==X.Y.Z appears
  # on PyPI, its khora-accel==X.Y.Z dependency is already resolvable.
  # ============================================================================
  publish-accel:
    needs: verify-ci-green
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: pypi
    permissions:
      id-token: write   # required for PyPI OIDC trusted publishing
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Stamp the git tag version into Cargo.toml — single source of truth
      # for khora-accel. maturin reads version from Cargo.toml when the
      # pyproject's `dynamic = ["version"]` is set. (No fetch-tags needed:
      # the version is taken from ${GITHUB_REF}, not from `git describe`.)
      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Publishing khora-accel version: $VERSION"
          sed -i.bak "s/^version = .*/version = \"$VERSION\"/" rust/khora-accel/Cargo.toml
          rm -f rust/khora-accel/Cargo.toml.bak

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install maturin
        run: pip install 'maturin>=1.5,<2.0'

      - name: Build sdist
        run: maturin sdist --manifest-path rust/khora-accel/Cargo.toml --out dist

      # skip-existing handles re-runs of an already-published version cleanly.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # ============================================================================
  # Publish khora — pure-Python wheel + sdist to PyPI via Trusted Publishing.
  #
  # Runs AFTER publish-accel so that resolvers seeing khora==X.Y.Z can always
  # also resolve its khora-accel==X.Y.Z dep.
  #
  # hatch-vcs derives khora's version from the git tag automatically.
  # The `Pin khora-accel to release version` step rewrites pyproject.toml so
  # the published wheel/sdist hard-pins khora-accel==X.Y.Z (lockstep contract).
  # ============================================================================
  publish-khora:
    needs: publish-accel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: pypi
    permissions:
      id-token: write   # required for PyPI OIDC trusted publishing
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Full history + tag refs required for hatch-vcs to derive version
          # from git tags. fetch-depth alone is not enough on actions/checkout
          # v4+: tag refs are skipped unless fetch-tags is set explicitly.
          # Without this, hatch-vcs sees no tag and falls back to "next-dev"
          # → e.g. 0.10.3.dev0 instead of 0.10.2.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install build dependencies
        run: uv pip install build --system

      # Lockstep is enforced at commit time, NOT release time: the same PR that
      # bumps rust/khora-accel/Cargo.toml also updates the `khora-accel == X.Y.Z`
      # pin in pyproject.toml's `rust` extra. See CLAUDE.md → Version Bumps.
      #
      # Why not sed at release time? `sed` on the runner's pyproject.toml leaves
      # the working tree dirty. setuptools_scm/hatch-vcs treats `dirty` at a tag
      # as "ahead of tag" → bumps to next-patch.dev0 (e.g. 0.10.4.dev0 instead
      # of 0.10.3). This is the bug we are working around.

      # hatch-vcs reads the version from the most recent git tag automatically.
      # Produces both dist/*.whl and dist/*.tar.gz for upload.
      - name: Build wheel and sdist
        run: |
          python -m build
          ls -la dist/

      # skip-existing handles re-runs of an already-published version cleanly.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # ============================================================================
  # Smoke-install the published wheel and run the happy path.
  #
  # Why this job exists: `make test` and CI run against the source tree, not
  # against the published artifact. Two v0.10.x releases shipped broken wheels
  # to PyPI (a `dev0` suffix from hatch-vcs misconfig, a missing `khora-accel`
  # version pin) because the build-from-source test suite couldn't observe
  # those problems. This job pulls `khora[sqlite-lance]==${VERSION}` from PyPI
  # in a clean checkout-less workspace and exercises the happy path end-to-end.
  #
  # Failure here means the published wheel is broken; the release should be
  # yanked and re-cut. We deliberately use the ubuntu-latest runner (not a
  # slim Docker image) because khora-accel ships sdist-only and needs Rust to
  # build on install — Rust is pre-installed on ubuntu-latest.
  #
  # ``github-release`` below blocks on this job so the release page never
  # advertises a version whose wheel cannot install + import.
  # ============================================================================
  smoke-install:
    needs: publish-khora
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install published wheel from PyPI
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Smoke-installing khora==${VERSION} from PyPI..."
          # PyPI's CDN can lag a few seconds behind the upload — retry a few
          # times rather than failing on a transient miss.
          for attempt in 1 2 3 4 5; do
            if pip install --upgrade "khora[sqlite-lance,rust,otel]==${VERSION}"; then
              break
            fi
            echo "pip install attempt $attempt failed; sleeping 10s..."
            sleep 10
          done
          pip show khora | grep -E "^(Name|Version):"
          pip show khora-accel | grep -E "^(Name|Version):"
          # Verify the [otel] extra pulled the SDK + HTTP exporter.
          python -c "import opentelemetry.sdk.trace; import opentelemetry.exporter.otlp.proto.http.trace_exporter; print('OTel SDK + HTTP exporter present')"

      - name: Run smoke script (Khora.remember + recall round-trip)
        run: |
          python - <<'PY'
          import asyncio, tempfile
          from pathlib import Path

          import khora
          from khora import Khora
          from khora.config import KhoraConfig
          from khora.config.schema import SQLiteLanceConfig

          print(f"khora version: {khora.__version__}")

          async def main() -> None:
              with tempfile.TemporaryDirectory() as tmp:
                  tmp_path = Path(tmp)
                  cfg = KhoraConfig()
                  cfg.storage.backend = "sqlite_lance"
                  cfg.storage.sqlite_lance = SQLiteLanceConfig(
                      db_path=str(tmp_path / "khora.db"),
                      lance_path=str(tmp_path / "khora.lance"),
                      embedding_dimension=32,
                  )
                  cfg.llm.embedding_dimension = 32
                  cfg.storage.embedding_dimension = 32
                  cfg.neo4j_url = None
                  # Stub the embedder so this smoke runs without an OPENAI key.
                  from khora.extraction.embedders.litellm import LiteLLMEmbedder

                  async def _stub_embed_batch(self, texts):
                      return [[1.0] + [0.0] * 31 for _ in texts]

                  async def _stub_embed(self, text):
                      return [1.0] + [0.0] * 31

                  LiteLLMEmbedder.embed_batch = _stub_embed_batch
                  LiteLLMEmbedder.embed = _stub_embed

                  async with Khora(cfg, engine="skeleton", run_migrations=True) as kb:
                      ns = await kb.create_namespace()
                      # Skeleton does not extract typed entities/relationships and
                      # rejects entity_types/relationship_types since 0.18.0 (#890).
                      # The smoke only needs a remember + recall round-trip.
                      result = await kb.remember(
                          "Smoke-install end-to-end test from release.yml.",
                          namespace=ns.namespace_id,
                      )
                      assert result.chunks_created >= 1, "no chunks created"
                      recall = await kb.recall("smoke-install", namespace=ns.namespace_id, limit=3)
                      assert recall.chunks, "recall returned no chunks"
                      print(f"OK: {result.chunks_created} chunks ingested, {len(recall.chunks)} recalled")

              # OTel-first smoke: configure_telemetry returns a handle and
              # diagnostics() reports the bootstrap state. We avoid hitting
              # a real endpoint here — just verify the wiring is reachable
              # from the published wheel.
              from khora.telemetry import configure_telemetry, diagnostics
              handle = configure_telemetry(backend="none")
              assert handle.backend == "none"
              d = diagnostics()
              assert d["contract_version"], "telemetry contract version missing"
              print(f"OK: telemetry diagnostics — contract_version={d['contract_version']}")

          asyncio.run(main())
          PY

  # ============================================================================
  # Create the GitHub release for this tag with auto-generated notes.
  #
  # Gated on ``smoke-install`` so the release page never advertises a version
  # whose wheel cannot install + import. Notes are populated by GitHub from
  # the merged PRs between this tag and the previous tag. The release is
  # marked ``latest`` only when the version isn't a pre-release.
  # ============================================================================
  github-release:
    needs: smoke-install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write   # required to create the release
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=${GITHUB_REF#refs/tags/}
          # Skip pre-release tags from the "latest" pointer (e.g. v1.0.0-rc1).
          if [[ "$TAG" == *-* ]]; then
            LATEST_FLAG="--latest=false"
          else
            LATEST_FLAG="--latest"
          fi
          # Idempotent: if a release for this tag already exists (manual
          # backfill via the UI, or workflow re-run), leave it untouched —
          # it may have been hand-edited for a reason — and just print it.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; leaving it untouched."
            gh release view "$TAG"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes $LATEST_FLAG
          fi
