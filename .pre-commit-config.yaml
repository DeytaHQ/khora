repos:
  # ADR-084: secret typing enforcement (DYT-3993). Severity override in
  # .semgrep.yml keeps this at WARNING during the D3-R migration window.
  - repo: https://github.com/DeytaHQ/deyta-core
    rev: v0.4.0
    hooks:
      - id: deyta-secret-typing

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix, --line-length=120]
      - id: ruff-format
        args: [--line-length=120]

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run ty check src/
        language: system
        pass_filenames: false
        types: [python]

      - id: no-agents-md
        name: refuse AGENTS.md in index
        entry: AGENTS.md is gitignored (locally regenerated); do not git add -f
        language: fail
        files: '^AGENTS\.md$'
