# Khora Development Infrastructure
#
# Provides PostgreSQL (with pgvector), Neo4j, and Weaviate for local development.
# Use khora as a Python library after starting these databases.
#
# Usage:
#   docker compose up -d                       # Start defaults (postgres + neo4j)
#   docker compose up -d postgres              # Start only postgres
#   docker compose up -d weaviate              # Start only weaviate (opt-in profile)
#   docker compose --profile weaviate up -d    # Start postgres + neo4j + weaviate
#   docker compose down                        # Stop all
#   docker compose down -v                     # Stop and remove data
#   docker compose logs -f postgres            # Follow postgres logs
#
# Connection strings for .env:
#   KHORA_DATABASE_URL=postgresql://khora:khora@localhost:5434/khora
#   KHORA_NEO4J_URL=bolt://neo4j:pleaseletmein@localhost:7688
#   KHORA_WEAVIATE_URL=http://localhost:8090
#
# Ports are intentionally non-standard to avoid conflicts with other projects:
#   PostgreSQL:     5434  (not 5432/5433)
#   Neo4j HTTP:     7475  (not 7474)
#   Neo4j Bolt:     7688  (not 7687)
#   Memgraph Bolt:  7689  (not 7687/7688 — opt-in `memgraph` profile)
#   Weaviate HTTP:  8090  (not 8080 — too commonly taken)
#   Weaviate gRPC: 50061  (not 50051)
#
# Weaviate is opt-in via the `weaviate` profile so it does not autostart
# with the default `docker compose up -d`. Either run `docker compose up -d
# weaviate` directly, or include the `--profile weaviate` flag to bring up
# the full stack.

services:
  # ============================================================================
  # PostgreSQL with pgvector
  # ============================================================================
  postgres:
    image: pgvector/pgvector:pg17
    container_name: khora-postgres
    environment:
      POSTGRES_USER: khora
      POSTGRES_PASSWORD: khora
      POSTGRES_DB: khora
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khora -d khora"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - khora-network

  # ============================================================================
  # Neo4j Graph Database
  # ============================================================================
  neo4j:
    image: neo4j:2025.12.1
    container_name: khora-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-pleaseletmein}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_auth__max__failed__attempts: "0"
    ports:
      - "${NEO4J_HTTP_PORT:-7475}:7474"
      - "${NEO4J_BOLT_PORT:-7688}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - khora-network

  # ============================================================================
  # Memgraph Graph Database (opt-in via `memgraph` profile)
  # ============================================================================
  # Bolt-compatible in-memory graph DB. No APOC, no versioning primitives - the
  # dream graph mirror is flat soft-delete only (#1278). Opt-in so it does not
  # autostart with the default `docker compose up -d`; start it with
  # `docker compose up -d memgraph` or `--profile memgraph up -d`.
  memgraph:
    image: memgraph/memgraph:3.11.0
    container_name: khora-memgraph
    profiles:
      - memgraph
    command: ["--bolt-port=7687", "--log-level=WARNING"]
    ports:
      # 7689 on the host to avoid colliding with Neo4j's 7688 (compose) / 7687.
      - "${MEMGRAPH_BOLT_PORT:-7689}:7687"
    # No persistent volume: Memgraph is in-memory and this is a dev/test side-car.
    # A named volume gets created root-owned, and the 3.x image (runs as user
    # `memgraph`) refuses to start when /var/lib/memgraph is owned by another
    # user, so an ephemeral data dir is both simpler and crash-free.
    healthcheck:
      # Memgraph ships no curl/wget and /bin/sh is dash (no /dev/tcp), so probe
      # Bolt with the bundled mgconsole client instead.
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --host 127.0.0.1 --port 7687 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - khora-network

  # ============================================================================
  # Weaviate Vector Database (opt-in via `weaviate` profile)
  # ============================================================================
  # khora supplies its own embeddings, so DEFAULT_VECTORIZER_MODULE=none and
  # ENABLE_MODULES is empty — no plugin downloads, fast startup.
  # Anonymous access is on for local dev only; production deployments should
  # set AUTHENTICATION_APIKEY_ENABLED=true + AUTHENTICATION_APIKEY_ALLOWED_KEYS.
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    container_name: khora-weaviate
    profiles:
      - weaviate
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
      DISABLE_TELEMETRY: "true"
    ports:
      - "${WEAVIATE_HTTP_PORT:-8090}:8080"
      - "${WEAVIATE_GRPC_PORT:-50061}:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q --spider http://localhost:8080/v1/.well-known/ready || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - khora-network

volumes:
  postgres_data:
    name: khora_postgres_data
  neo4j_data:
    name: khora_neo4j_data
  neo4j_logs:
    name: khora_neo4j_logs
  weaviate_data:
    name: khora_weaviate_data

networks:
  khora-network:
    name: khora-network
    driver: bridge
