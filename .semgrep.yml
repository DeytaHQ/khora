# ADR-084: Typed Secret Handling — severity override for migration window (DYT-3993).
# The upstream rule (deyta-core) defaults to ERROR; we downgrade to WARNING so CI
# remains green while D3-R re-types the v1-scope fields.  Remove this file once
# all str-typed secrets are re-typed (D3-C).
rules:
  - id: deyta-secret-typing-str-password
    languages: [python]
    severity: WARNING
    message: >-
      Field '$FIELD' has a secret-pattern name but is typed as plain 'str'.
      Use SecretStr to prevent accidental exposure in logs and repr.
      ADR-084 D3-R migration window: severity downgraded from ERROR to WARNING temporarily.
    patterns:
      - pattern-either:
          - pattern: |
              class $CLASS:
                  ...
                  $FIELD: str
                  ...
          - pattern: |
              class $CLASS:
                  ...
                  $FIELD: str = ...
                  ...
      - metavariable-regex:
          metavariable: $FIELD
          regex: (?i)(password|passwd|secret|token|api_key|apikey|auth_key|credential|private_key|signing_key|access_key|encryption_key)
