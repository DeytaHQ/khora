# Discovery Agent LiteLLM Configuration
# Copy to your project and customize, then use:
#   khora ontology discover --litellm ./litellm.discovery.yaml
# Or set: KHORA_DISCOVERY_LITELLM_CONFIG=./litellm.discovery.yaml

# Planning: query formulation and source classification (fast, cheap)
planning:
  model: "gpt-4o-mini"
  temperature: 0.3
  max_tokens: 4096

# Code generation: fetch script generation (stronger model for better code)
codegen:
  model: "claude-sonnet-4-20250514"
  temperature: 0.2
  max_tokens: 8192

# Summarization: content summarization (fast, cheap)
summarization:
  model: "gpt-4o-mini"
  temperature: 0.1
  max_tokens: 2048

# Budget
budget_usd: 2.0
