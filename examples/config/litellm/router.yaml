# Multi-Provider Router Configuration for Khora
# Uses LiteLLM router for automatic failover between providers

model: "gpt-4o-mini"  # Default model
api_key_env: "OPENAI_API_KEY"

# Model parameters
temperature: 0.7
max_tokens: 8192

# Request configuration
timeout: 120
max_retries: 3
retry_wait: 2

# Concurrency
max_concurrent_llm_calls: 20

# Embedding configuration
embedding_model: "text-embedding-3-small"
embedding_dimension: 1536

# Multi-provider router configuration with fallbacks
model_list:
  # Primary: OpenAI GPT-4o-mini
  - model_name: "default"
    litellm_params:
      model: "gpt-4o-mini"
      api_key: "os.environ/OPENAI_API_KEY"

  # Fallback 1: Anthropic Claude
  - model_name: "default"
    litellm_params:
      model: "claude-sonnet-4-20250514"
      api_key: "os.environ/ANTHROPIC_API_KEY"

  # Fallback 2: Google Gemini
  - model_name: "default"
    litellm_params:
      model: "gemini/gemini-2.0-flash"
      api_key: "os.environ/GOOGLE_API_KEY"

  # High-quality model for complex extraction
  - model_name: "high_quality"
    litellm_params:
      model: "gpt-4o"
      api_key: "os.environ/OPENAI_API_KEY"

  - model_name: "high_quality"
    litellm_params:
      model: "claude-sonnet-4-20250514"
      api_key: "os.environ/ANTHROPIC_API_KEY"

router_settings:
  routing_strategy: "simple-shuffle"
  num_retries: 3
  timeout: 120
  retry_after: 2
  allowed_fails: 2
