# Anthropic Claude configuration for Khora — the contents of the `llm:` block.
#
# Anthropic has no embedding model, so embeddings run on OpenAI. Khora resolves
# each provider's key from the environment per call, so export BOTH:
#     export ANTHROPIC_API_KEY=...   # the chat/extraction model below
#     export OPENAI_API_KEY=...      # the embedding model below
# `api_key_env` names the key for the chat model; the embedding provider's key
# is read from the environment.

model: claude-sonnet-4-20250514
api_key_env: ANTHROPIC_API_KEY

temperature: 0.7
max_tokens: 8192
timeout: 180
max_retries: 3
max_concurrent_llm_calls: 10  # Anthropic rate limits are tighter than OpenAI's

# Embeddings on OpenAI (1536-wide, matches the Postgres vector column).
embedding_model: text-embedding-3-small
embedding_dimension: 1536
