# Khora Full Stack
#
# Complete stack with API, PostgreSQL, and Neo4j.
# Use for production-like testing of the Docker build.
#
# Usage:
#   docker compose -f compose.full.yaml up -d              # Start full stack
#   docker compose -f compose.full.yaml up -d --build      # Rebuild and start
#   docker compose -f compose.full.yaml logs -f api        # Follow API logs
#   docker compose -f compose.full.yaml down               # Stop all
#   docker compose -f compose.full.yaml down -v            # Stop and remove data

services:
  # ============================================================================
  # Khora API Service
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: khora:latest
    container_name: khora-api
    ports:
      - "${KHORA_PORT:-8000}:8000"
    environment:
      KHORA_HOST: "0.0.0.0"
      KHORA_PORT: "8000"
      KHORA_LOG_LEVEL: "${KHORA_LOG_LEVEL:-INFO}"
      KHORA_ENVIRONMENT: "${KHORA_ENVIRONMENT:-development}"
      KHORA_DATABASE_URL: "postgresql://khora:khora@postgres:5432/khora"
      KHORA_NEO4J_URL: "bolt://neo4j:khora@neo4j:7687"
      KHORA_AUTH_ENABLED: "${KHORA_AUTH_ENABLED:-false}"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - khora-network

  # ============================================================================
  # PostgreSQL with pgvector
  # ============================================================================
  postgres:
    image: pgvector/pgvector:pg17
    container_name: khora-postgres
    environment:
      POSTGRES_USER: khora
      POSTGRES_PASSWORD: khora
      POSTGRES_DB: khora
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khora -d khora"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - khora-network

  # ============================================================================
  # Neo4j Graph Database
  # ============================================================================
  neo4j:
    image: neo4j:5
    container_name: khora-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-khora}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - khora-network

volumes:
  postgres_data:
    name: khora_postgres_data
  neo4j_data:
    name: khora_neo4j_data
  neo4j_logs:
    name: khora_neo4j_logs

networks:
  khora-network:
    name: khora-network
    driver: bridge
